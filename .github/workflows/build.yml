name: Build and test node
# this custom script can be removed when govuk_frontend_toolkit is replaced.
# It generates a package-lock.json file which changes the hash key running hashFiles('**/package-lock.json')
on:
  workflow_call:
    inputs:
      node_version_file:
        description: "Passed to setup-node action to specify where to source the version of node from"
        required: false
        type: string
        default: ".nvmrc"

permissions:
  contents: read

jobs:
  node-build:
    name: Run the node build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Use Node.js ${{ inputs.node_version_file }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: npm
          node-version-file: .nvmrc
      - name: restore cache
        id: restore-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        env:
          cache-name: node-modules
        with:
          path: |
            ./node_modules
            ~/.cache/Cypress
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('./package-lock.json') }}
      - name: install dependencies
        if: steps.restore-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          npm ci --no-audit
      - name: build npm
        shell: bash
        run: |
          npm run build
          # Verify the build directory was created
          if [ ! -d ".build" ]; then
            echo "ERROR: .build directory was not created!"
            echo "Contents of current directory:"
            ls -la
            exit 1
          fi
          echo "Build directory created successfully:"
          ls -la .build/
      - name: Linter check # Run linter after build because the integration test code depend on compiled typescript...
        shell: bash
        run: |
          npm run lint
      - name: upload the artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm_build_artifacts
          path: .build/
          include-hidden-files: true
      - name: save cache
        id: save-cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        env:
          cache-name: node-modules
        with:
          path: ./node_modules
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('./package-lock.json') }}
