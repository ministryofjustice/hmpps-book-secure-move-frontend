name: Pipeline [test -> build -> deploy]

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      additional_docker_tag:
        description: Additional docker tag that can be used to specify stable or testing tags
        required: false
        default: ''
        type: string
      push:
        description: Push docker image to registry flag
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  # if branch is main, append commit sha to the group name, so that other jobs from main don't get cancelled
  group: ${{ github.workflow }}-${{ github.ref }}${{ (github.ref == 'refs/heads/main') && format('-{0}', github.sha) || '' }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # main node build workflow
  node_build:
    name: node build
    #uses: ministryofjustice/hmpps-github-actions/.github/workflows/node_build.yml@v2 # WORKFLOW_VERSION
    uses: ./.github/workflows/build.yml # this custom script can be removed when govuk_frontend_toolkit is replaced.
    secrets: inherit
  node_unit_tests:
    name: node unit tests
    uses: ./.github/workflows/node_unit_tests.yml
    needs: [node_build]
    secrets: inherit
    with:
      artifacts_path: reports
      test_results_path: mocha/test-results.xml
  # generic node integration tests using wiremock - feel free to override with local tests if required
  node_e2e_tests:
    name: node E2E tests
    uses: ./.github/workflows/node_e2e_tests.yml
    needs: [node_build]
    secrets: inherit
  helm_lint:
    strategy:
      matrix:
        environments: ['staging', 'uat', 'preprod', 'production']
    name: helm lint
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/test_helm_lint.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      environment: ${{ matrix.environments }}
  docker_build:
    name: Build docker image from hmpps-github-actions
    if: github.ref == 'refs/heads/main'
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/docker_build.yml@v2 # WORKFLOW_VERSION
    needs:
      - node_e2e_tests
      - node_unit_tests
    with:
      docker_registry: 'ghcr.io'
      registry_org: 'ministryofjustice'
      additional_docker_tag: ${{ inputs.additional_docker_tag }}
      push: ${{ inputs.push || true }}
      docker_multiplatform: false
  deploy_staging:
    name: Deploy to the staging environment
    needs:
      - docker_build
      - helm_lint
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/deploy_env.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      environment: 'staging'
      app_version: '${{ needs.docker_build.outputs.app_version }}'
  sentry_staging:
    name: Publish staging release to Sentry
    needs:
      - docker_build
      - deploy_staging
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/sentry_release_and_deploy.yml@v2
    with:
      sentry_project: book-a-secure-move-frontend
      sentry_environment: 'staging'
      sentry_create_release: 'true'
      app_version: '${{ needs.docker_build.outputs.app_version }}'
    secrets: inherit
  deploy_uat:
    name: Deploy to UAT environment
    needs:
      - docker_build
      - deploy_staging
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/deploy_env.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      environment: 'preprod'
      app_version: '${{ needs.docker_build.outputs.app_version }}'
  sentry_uat:
    name: Publish UAT release to Sentry
    needs:
      - docker_build
      - deploy_uat
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/sentry_release_and_deploy.yml@v2
    with:
      sentry_project: book-a-secure-move-frontend
      sentry_environment: 'uat'
      sentry_create_release: 'true'
      app_version: '${{ needs.docker_build.outputs.app_version }}'
    secrets: inherit
  deploy_preprod:
    name: Deploy to pre-production environment
    needs:
      - docker_build
      - deploy_staging
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/deploy_env.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      environment: 'preprod'
      app_version: '${{ needs.docker_build.outputs.app_version }}'
  sentry_preprod:
    name: Publish preprod release to Sentry
    needs:
      - docker_build
      - deploy_preprod
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/sentry_release_and_deploy.yml@v2
    with:
      sentry_project: book-a-secure-move-frontend
      sentry_environment: 'preprod'
      sentry_create_release: 'true'
      app_version: '${{ needs.docker_build.outputs.app_version }}'
    secrets: inherit
  deploy_production:
    name: Deploy to production environment
    needs:
      - docker_build
      - deploy_preprod
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/deploy_env.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      environment: 'production'
      app_version: '${{ needs.docker_build.outputs.app_version }}'
  sentry_production:
    name: Publish production release to Sentry
    needs:
      - docker_build
      - deploy_production
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/sentry_release_and_deploy.yml@v2
    with:
      sentry_project: book-a-secure-move-frontend
      sentry_environment: 'production'
      sentry_create_release: 'true'
      app_version: '${{ needs.docker_build.outputs.app_version }}'
    secrets: inherit
